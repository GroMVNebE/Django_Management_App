{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <style>
        @media (max-width: 480px) {
            .login-card {
                padding: 24px 20px;
            }

            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <h1>Авторизация</h1>
        <p>Введите данные для входа</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-error">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" name="username" id="username" class="form-control" placeholder="Введите логин" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Введите пароль" required>
        </div>

        <button type="submit" class="btn-submit">Войти</button>
    </form>
</div>

</body>
</html>
